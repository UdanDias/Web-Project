<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership Registration</title>
    <link rel="stylesheet" href="membership.css">
</head>
<body>
  
    <nav class="nav-container">
        <div class="logo"><img src="../img/Logo4.png" alt="logo"></div>
        
            <ul class="nav-items">
                <li><a href="index.html">Home</a></li>
                <li><a href="Books.html">Books</a></li>
                <li><a href="Membership.html">Membership</a></li>
                <li><a href="My Account.html">My Account</a></li>
                <li><a href="Contact us.html">Contact Us</a></li>
            </ul>
    </nav>

   <div class="page-container">
        <h1 class="outside-title">Registration form</h1>
            <form class="form-card" action="#" method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label for="fullname">Full Name<span class="required">*</span></label>
                        <input type="text" id="fullname" placeholder="Suresh Perera" required>
                    </div>

                    <div class="form-group">
                        <label for="dob">date of Birth<span class="required">*</span></label>
                        <input type="text" id="dob" required>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label for="email">Email<span class="required">*</span></label>
                    <input type="email" id="ëmail" placeholder="abc@example.com" required>
                </div>

                <div class="form-group full-width">
                    <label for="phone">Phone Number<span class="required">*</span></label>
                    <input type="tel" id="phone" placeholder="+94712345678" required>
                </div>

                <div class="form-group full-width">
                    <label for="address">Full Address<span class="required">*</span></label>
                    <input type="text" id="address" placeholder="123, abc road,colombo" required>
                </div>

                <div class="form-group full-width">
                    <label for="membership">membership Type<span class="required">*</span></label>
                    <select id="membership" required>
                        <option value="" disabled selected>select membership type</option>
                        <option value="standard">Standard</option>
                        <option value="prmium">Premium</option>
                        <option value="vip">VIP</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password<span class="required">*</span></label>
                        <input type="password" id="password">
                        <span class="help-text">Enter a password</span>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" placeholder="repeat password" required>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms" class="plain-label">I agree to the Terms of 
                        service and Privaccy Policy of BookTrack Library.<span class="required">*</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-submit">Register</button>
            </form>
    </div>
    
    
</body>
</html>
